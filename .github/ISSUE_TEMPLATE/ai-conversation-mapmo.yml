  - type: dropdown
    id: ai_tool
    attributes:
      label: 使用的 AI 工具
      options:
        - Claude
        - ChatGPT
        - Gemini
        - GitHub Copilot
        - Cursor
        - 其他(請在內容中註明)
    validations:
      required: true


  - type: textarea
    id: conversation
    attributes:
      label: 對話內容
      description: |
        用以下格式貼,多輪就一直接下去:

        ### 我問:
        (你的提示詞)

        ### AI 答:
        (AI 的回應)

        ### 我問:
        (追問)

        ### AI 答:
        (回應)
      value: |
        ### 我問:


        ### AI 答:

      render: markdown
    validations:
      required: true
