name: 📋 新增任務 - Diula (B 組)
description: Diula 成員開任務用此表單
title: "[任務][Diula] "
labels: ["type:task", "team:b"]
body:
  - type: markdown
    attributes:
      value: |
        ## 開立新任務
        填寫以下欄位後送出。送出後請到右側 Assignees 指派負責的組員、選擇對應的 Milestone (週次)。

  - type: dropdown
    id: week
    attributes:
      label: 週次
      description: 預計在哪一週完成?
      options:
        - W1
        - W2
        - W3
        - W4
        - W5
        - W6
        - W7
        - W8
        - W9
        - W10
        - W11
        - W12
        - W13
        - W14
        - W15
        - W16
        - W17
        - W18
        - W19
        - W20
        - W21
        - W22
        - W23
        - W24
        - W25
        - W26
        - W27
        - W28
        - W29
        - W30
        - W31
        - W32
        - W33
        - W34
        - W35
        - W36
        - W37
        - W38
        - W39
        - W40
        - W41
        - W42
        - W43
        - W44
        - W45
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 任務類型
      options:
        - design - 設計
        - dev - 開發
        - marketing - 行銷
        - sponsorship - 贊助
        - merchandise - 週邊產品
        - cutating - 校內外展場相關
        - research - 研究/文獻
        - meeting - 會議/討論
        - documentation - 文件撰寫
        - milestone - 重要里程碑
        - other - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 任務描述
      description: 這個任務具體要做什麼?
      placeholder: |
        例:
        - 完成登入畫面的 wireframe
        - 包含手機版與桌面版兩種尺寸
        - 上傳到 Figma 連結...
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: 預計完成日 (YYYY-MM-DD)
      placeholder: "2026-05-08"
    validations:
      required: true

  - type: textarea
    id: criteria
    attributes:
      label: 完成條件 (Definition of Done)
      description: 怎樣才算完成?(選填,但建議寫)
      placeholder: |
        - [ ] Wireframe 完成並上傳 Figma
        - [ ] 經組長確認
        - [ ] 在組會中報告

  - type: markdown
    attributes:
      value: |
        ---
        **送出後別忘了**:右側欄位指派 Assignees + 選擇 Milestone。
